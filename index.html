<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

#controls{
position:fixed;
bottom:20px;
right:20px;
background:rgba(255,255,255,0.08);
padding:12px;
border-radius:12px;
color:white;
font-size:12px;
}

input{ width:120px; }
</style>

</head>

<body>

<div id="controls">
Areia<br>
<input type="range" id="density" min="3000" max="20000" value="8000">
<br><br>
Movimento<br>
<input type="range" id="motion" min="0.1" max="2" step="0.1" value="0.5">
</div>

<script>

let particles=[]
let particleCount=8000

let motion=0.5

let cx, cy, radius

let song, fft
let isPlaying=false

function preload(){
song = loadSound("song.mp3")
}

function setup(){

createCanvas(window.innerWidth,window.innerHeight)

cx = width/2
cy = height/2
radius = min(width,height)*0.45

fft = new p5.FFT(0.8,256)

createParticles()

stroke(230,210,160)
strokeWeight(1.5)

}

function createParticles(){

particles=[]

for(let i=0;i<particleCount;i++){

let a=random(TWO_PI)
let r=sqrt(random())*radius

particles.push({

x:cx + cos(a)*r,
y:cy + sin(a)*r,
vx:random(-1,1),
vy:random(-1,1)

})

}

}

/* padrão chladni simples */

function field(x,y){

let dx=(x-cx)/radius
let dy=(y-cy)/radius

let r=sqrt(dx*dx+dy*dy)
let theta=atan2(dy,dx)

return sin(4*PI*r)*cos(6*theta)

}

function draw(){

background(0)

motion=parseFloat(document.getElementById("motion").value)

let newCount=parseInt(document.getElementById("density").value)

if(newCount!==particleCount){
particleCount=newCount
createParticles()
}

if(isPlaying){
fft.analyze()
}

/* partículas */

for(let p of particles){

let dx=p.x-cx
let dy=p.y-cy

let dist=sqrt(dx*dx+dy*dy)

/* mantém dentro do círculo */

if(dist>radius){

let a=atan2(dy,dx)
p.x = cx + cos(a)*radius
p.y = cy + sin(a)*radius

}

/* força vibracional */

let v=field(p.x,p.y)

p.vx += -v * dx * 0.05
p.vy += -v * dy * 0.05

/* movimento */

p.vx *= 0.95
p.vy *= 0.95

p.x += p.vx + random(-motion,motion)
p.y += p.vy + random(-motion,motion)

point(p.x,p.y)

}

}

/* áudio */

async function toggleMusic(){

let ctx=getAudioContext()

if(ctx.state!=="running"){
await ctx.resume()
}

if(isPlaying){
song.pause()
isPlaying=false
}else{
song.loop()
fft.setInput(song)
isPlaying=true
}

}

document.body.addEventListener("pointerdown",(e)=>{

if(e.target.closest("#controls")) return

toggleMusic()

})

function windowResized(){

resizeCanvas(window.innerWidth,window.innerHeight)

cx = width/2
cy = height/2
radius = min(width,height)*0.45

createParticles()

}

</script>

</body>
</html>
