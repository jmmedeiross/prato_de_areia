<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

/* CONTROLES */

#controls{

position:fixed;
bottom:20px;
right:20px;

background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);

padding:12px;
border-radius:12px;

color:white;
font-size:12px;

}

input[type=range]{
width:130px;
}

</style>

</head>

<body>

<div id="controls">

<div>
Areia<br>
<input type="range" id="density" min="8000" max="30000" value="16000">
</div>

<div>
Movimento<br>
<input type="range" id="motion" min="0.00005" max="0.0005" step="0.00005" value="0.0002">
</div>

</div>

<script>

let song, fft

let particles=[]
let particleCount=16000

let motion=0.0002

let m=4, n=3
let targetM=4, targetN=3

let isPlaying=false
let lastChange=0

let plateRadius

function preload(){
song = loadSound("song.mp3")
}

function setup(){

createCanvas(window.innerWidth,window.innerHeight)

fft = new p5.FFT(0.8,256)

plateRadius=min(width,height)*0.45

createParticles()

stroke(230,210,160)
strokeWeight(1.2) // 🔥 importante pra aparecer

}

function createParticles(){

particles=[]

for(let i=0;i<particleCount;i++){

let angle=random(TWO_PI)
let r=sqrt(random())*0.5

particles.push({

x:0.5 + cos(angle)*r,
y:0.5 + sin(angle)*r,

vx:random(-0.0003,0.0003),
vy:random(-0.0003,0.0003)

})

}

}

function chladni(x,y){

let dx=x-0.5
let dy=y-0.5

let r=sqrt(dx*dx+dy*dy)
let theta=atan2(dy,dx)

let radial = sin(n*PI*r*4)
let angular = cos(m*theta)

return radial*angular

}

function draw(){

background(0)

motion=parseFloat(document.getElementById("motion").value)

let newCount=parseInt(document.getElementById("density").value)

if(newCount!=particleCount){

particleCount=newCount
createParticles()

}

/* transição suave */

m=lerp(m,targetM,0.02)
n=lerp(n,targetN,0.02)

if(isPlaying){

fft.analyze()

let bass=fft.getEnergy("bass")

if(bass>170 && millis()-lastChange>2500){

targetM=int(random(2,7))
targetN=int(random(2,6))

lastChange=millis()

}

}

translate(width/2,height/2)

for(let p of particles){

let dx=p.x-0.5
let dy=p.y-0.5

let dist=sqrt(dx*dx+dy*dy)

/* limite circular invisível */

if(dist>0.5){

let a=atan2(dy,dx)
p.x=0.5+cos(a)*0.49
p.y=0.5+sin(a)*0.49

}

/* campo vibracional */

let v=chladni(p.x,p.y)

/* força estável */

let fx=-v*dx*0.05
let fy=-v*dy*0.05

p.vx+=fx
p.vy+=fy

p.vx*=0.96
p.vy*=0.96

p.x+=p.vx+random(-motion,motion)
p.y+=p.vy+random(-motion,motion)

point((p.x-0.5)*plateRadius*2,(p.y-0.5)*plateRadius*2)

}

}

/* áudio */

async function toggleMusic(){

let ctx=getAudioContext()

if(ctx.state!=="running"){
await ctx.resume()
}

if(isPlaying){

song.pause()
isPlaying=false

}else{

song.loop()
fft.setInput(song)
isPlaying=true

}

}

document.body.addEventListener("pointerdown",(e)=>{

if(e.target.closest("#controls")) return

toggleMusic()

})

function windowResized(){

resizeCanvas(window.innerWidth,window.innerHeight)

plateRadius=min(width,height)*0.45

}

</script>

</body>
</html>
