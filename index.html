<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

/* CONTROLES RESPONSIVOS */

#controls{

position:fixed;
bottom:20px;
right:20px;

background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);

padding:14px;
border-radius:14px;

color:white;

}

/* mobile */

@media (max-width:600px){

#controls{
bottom:10px;
right:10px;
padding:10px;
}

input[type=range]{
width:150px;
}

}

/* desktop */

@media (min-width:601px){

input[type=range]{
width:120px;
}

}

#controls div{
margin-bottom:10px;
}

input[type=range]{

-webkit-appearance:none;
height:2px;
background:rgba(255,255,255,0.4);

}

input[type=range]::-webkit-slider-thumb{

-webkit-appearance:none;
width:14px;
height:14px;
border-radius:50%;
background:white;

}

</style>

</head>

<body>

<div id="controls">

<div>
Areia<br>
<input type="range" id="density" min="20000" max="90000" value="50000">
</div>

<div>
Movimento<br>
<input type="range" id="motion" min="0.00001" max="0.0004" step="0.00001" value="0.0001">
</div>

</div>

<script>

let song
let fft

let particles=[]
let particleCount=50000

let motion=0.0001

let m=4
let n=2

let targetM=4
let targetN=2

let isPlaying=false
let lastChange=0

let plateRadius

function preload(){
song = loadSound("song.mp3")
}

function setup(){

createCanvas(window.innerWidth,window.innerHeight)

fft = new p5.FFT(0.8,256)

plateRadius=min(width,height)*0.45

createParticles()

stroke(230,210,160)

}

function createParticles(){

particles=[]

for(let i=0;i<particleCount;i++){

let angle=random(TWO_PI)
let r=sqrt(random())*0.5

particles.push({

x:0.5 + cos(angle)*r,
y:0.5 + sin(angle)*r,

vx:random(-0.0005,0.0005),
vy:random(-0.0005,0.0005)

})

}

}

/* Bessel approximation */

function bessel(m,x){

let sum=0

for(let k=0;k<8;k++){

let num=pow(-1,k)*pow(x/2,(2*k+m))
let den=factorial(k)*factorial(k+m)

sum+=num/den

}

return sum

}

function chladniMode(x,y){

let dx=x-0.5
let dy=y-0.5

let r=sqrt(dx*dx+dy*dy)
let theta=atan2(dy,dx)

let radial=bessel(m,r*10*n)
let angular=cos(m*theta)

return radial*angular

}

function draw(){

background(0)

motion=parseFloat(document.getElementById("motion").value)

let newCount=parseInt(document.getElementById("density").value)

if(newCount!=particleCount){

particleCount=newCount
createParticles()

}

/* transição suave */

m=lerp(m,targetM,0.02)
n=lerp(n,targetN,0.02)

if(isPlaying){

fft.analyze()

let bass=fft.getEnergy("bass")

if(bass>170 && millis()-lastChange>3000){

targetM=int(random(1,8))
targetN=int(random(1,6))

lastChange=millis()

}

}

translate(width/2,height/2)

/* simulação granular */

for(let i=0;i<particles.length;i++){

let p=particles[i]

let dx=p.x-0.5
let dy=p.y-0.5

let dist=sqrt(dx*dx+dy*dy)

/* limite do prato */

if(dist>0.5){

let a=atan2(dy,dx)
p.x=0.5+cos(a)*0.49
p.y=0.5+sin(a)*0.49

}

/* interação com vizinhos (areia real) */

for(let j=i+1;j<i+4 && j<particles.length;j++){

let q=particles[j]

let dx2=p.x-q.x
let dy2=p.y-q.y

let d=sqrt(dx2*dx2+dy2*dy2)

if(d<0.005){

let repulse=(0.005-d)*0.02

p.vx+=dx2*repulse
p.vy+=dy2*repulse

q.vx-=dx2*repulse
q.vy-=dy2*repulse

}

}

/* campo vibracional */

let v=chladniMode(p.x,p.y)

let fx=-v*(p.x-0.5)*0.1
let fy=-v*(p.y-0.5)*0.1

p.vx+=fx
p.vy+=fy

p.vx*=0.97
p.vy*=0.97

p.x+=p.vx+random(-motion,motion)
p.y+=p.vy+random(-motion,motion)

point((p.x-0.5)*plateRadius*2,(p.y-0.5)*plateRadius*2)

}

}

async function toggleMusic(){

let ctx=getAudioContext()

if(ctx.state!=="running"){
await ctx.resume()
}

if(isPlaying){

song.pause()
isPlaying=false

}else{

song.loop()
fft.setInput(song)
isPlaying=true

}

}

document.body.addEventListener("pointerdown",(e)=>{

if(e.target.closest("#controls")) return

toggleMusic()

})

function windowResized(){

resizeCanvas(window.innerWidth,window.innerHeight)

plateRadius=min(width,height)*0.45

}

</script>

</body>
</html>
